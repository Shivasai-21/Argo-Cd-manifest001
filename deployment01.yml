apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-helm-app
  labels:
    app: my-helm-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-helm-app
  template:
    metadata:
      labels:
        app: my-helm-app
    spec:
      containers:
      - name: my-helm-app
        image: shivasai21/snakegame:v2  # replace with your image
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi



---
apiVersion: v1
kind: Service
metadata:
  name: my-helm-app
  labels:
    app: my-helm-app
spec:
  type: LoadBalancer   # or NodePort/ClusterIP depending on your needs
  selector:
    app: my-helm-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
