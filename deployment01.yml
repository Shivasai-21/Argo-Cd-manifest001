apiVersion: apps/v1
kind: Deployment
metadata:
  name: snakegame
  namespace: default        # <-- add namespace here
  labels:
    app: snakegame
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snakegame
  template:
    metadata:
      labels:
        app: snakegame
    spec:
      containers:
      - name: snakegame
        image: shivasai21/snakegame:vnc   # build & push this improved image
        ports:
        - containerPort: 5900             # VNC port
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: snakegame
  namespace: default        # <-- add namespace here
  labels:
    app: snakegame
spec:
  type: LoadBalancer
  selector:
    app: snakegame
  ports:
  - protocol: TCP
    port: 5900
    targetPort: 5900
