apiVersion: apps/v1
kind: Deployment
metadata:
name: snakegame
labels:
app: snakegame

spec:
replicas: 1

selector:
matchLabels:
app: snakegame

template:
metadata:
labels:
app: snakegame


spec:
  containers:
  - name: snakegame
    image: shivasai21/snakegame:web-v1
    imagePullPolicy: Always

    ports:
    - containerPort: 5000


---

apiVersion: v1
kind: Service
metadata:
name: snakegame

spec:
selector:
app: snakegame

type: LoadBalancer

ports:

* protocol: TCP
  port: 80
  targetPort: 5000
