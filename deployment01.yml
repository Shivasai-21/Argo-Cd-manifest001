apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-helm-app
  labels:
    app: my-helm-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-helm-app
  template:
    metadata:
      labels:
        app: my-helm-app
    spec:
      containers:
      - name: my-helm-app
        image: shivasai21/movie:latest  # replace with your image
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
